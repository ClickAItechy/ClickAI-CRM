<div class="container">
    <div class="header-row">
        <h2>⏰ Follow-up Reminders</h2>
        <div class="stats-row">
            <div class="mini-stat today">
                <span class="val">{{ todayRemindersCount }}</span>
                <span class="lab">Reminders Today</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="filters-bar">
            <div class="filter-group">
                <label for="reminderDate" class="mr-2 font-medium">Date:</label>
                <input type="date" id="reminderDate" class="form-control form-control-sm"
                    style="width: auto; margin-left: 10px;" [(ngModel)]="selectedDate" (change)="onDateChange()">
            </div>
        </div>

        <div class="table-container">
            <table *ngIf="!loading && leads.length > 0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Company</th>
                        <th>Address</th>
                        <th>Emirate</th>
                        <th>Tech Requirements</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let lead of leads">
                        <td>{{ lead.id }}</td>
                        <td>
                            <a [routerLink]="['/dashboard/leads', lead.id]" class="lead-link"
                                (click)="$event.stopPropagation()">
                                {{ lead.name }}
                            </a>
                        </td>
                        <td>{{ lead.company_name }}</td>
                        <td>{{ lead.address }}</td>
                        <td>{{ lead.emirate }}</td>
                        <td>{{ lead.tech_requirements }}</td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-sm btn-outline-primary" (click)="setNewReminder(lead, $event)"
                                    title="Choose a new date">
                                    🗓️ Update Reminder
                                </button>
                                <button class="btn btn-sm btn-outline-danger" (click)="stopReminding(lead, $event)"
                                    title="Stop reminding me about this lead">
                                    🛑 Stop Reminding
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div *ngIf="loading" class="loading-state">Loading reminders...</div>
            <div *ngIf="!loading && leads.length === 0" class="empty-state">
                No reminders found for this date.
            </div>
        </div>
    </div>
</div>
